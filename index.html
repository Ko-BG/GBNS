<!DOCTYPE html>
<html lang="en" data-theme="stealth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comm-OS | Terminal</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --accent: #00f2ff;
            --lock-color: #ff0055;
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --glow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        [data-theme="neon"] {
            --bg: #0a0b1e;
            --card: rgba(188, 19, 254, 0.05);
            --border: rgba(188, 19, 254, 0.2);
            --accent: #bc13fe;
            --glow: 0 0 15px rgba(188, 19, 254, 0.3);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            margin: 0;
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        /* Sidebar Glassmorphism */
        #sidebar {
            background: rgba(0, 0, 0, 0.4);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        .header {
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-weight: 600;
            letter-spacing: 2px;
            font-size: 0.8rem;
            color: var(--accent);
            text-shadow: var(--glow);
        }

        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: thin;
        }

        .msg-bubble {
            background: var(--card);
            padding: 14px;
            border-radius: 4px 15px 15px 15px;
            border: 1px solid var(--border);
            font-size: 0.85rem;
            line-height: 1.4;
            animation: slideIn 0.2s ease-out forwards;
        }

        /* Editor Section */
        #workspace {
            padding: 40px;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top right, rgba(0, 242, 255, 0.03), transparent);
        }

        .workspace-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            padding: 40px;
            font-family: var(--font-mono);
            font-size: 1rem;
            line-height: 1.8;
            outline: none;
            resize: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.2);
        }

        textarea:focus { border-color: var(--accent); box-shadow: var(--glow); }
        textarea.locked-state { 
            border-color: var(--lock-color); 
            background: rgba(255, 0, 85, 0.02);
            color: #94a3b8;
        }

        /* Futuristic Controls */
        .btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 18px;
            border-radius: 2px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        .btn-lock { border-color: var(--lock-color); color: var(--lock-color); }
        .btn-lock:hover { background: var(--lock-color); color: white; }

        #chatInput {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 4px;
            color: white;
            font-family: var(--font-main);
            outline: none;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .status-dot {
            height: 6px; width: 6px; border-radius: 50%; display: inline-block; margin-right: 8px;
            background: var(--accent); box-shadow: var(--glow);
        }
    </style>
</head>
<body>

    <section id="sidebar">
        <div class="header">
            <span class="logo">COMM-OS // VER 1.1</span>
            <button class="btn" style="padding: 5px 10px;" onclick="toggleTheme()">🌓</button>
        </div>
        <div id="chat-flow"></div>
        <div style="padding: 20px; display: flex; flex-direction: column; gap: 10px;">
            <input type="text" id="chatInput" placeholder="Enter message...">
        </div>
    </section>

    <section id="workspace">
        <div class="workspace-header">
            <div>
                <small style="opacity: 0.5; font-family: var(--font-mono);">CHANNEL / GLOBAL_COLLAB</small>
                <h1 style="margin: 5px 0 0 0; font-weight: 300;">Unified_Document.txt</h1>
                <div id="status-container" style="margin-top: 10px; font-size: 0.7rem; font-family: var(--font-mono);">
                    <span class="status-dot" id="dot"></span><span id="status-text">SYNCING_HANDSHAKE...</span>
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="copyLink()">Share Link</button>
                <button id="lockBtn" class="btn btn-lock" onclick="requestLock()">Finalize & Lock</button>
            </div>
        </div>
        <textarea id="editor" spellcheck="false" placeholder="// Initializing communication layer..."></textarea>
    </section>

    <script>
        // Robust Socket Initialization
        const socket = io({
            transports: ['websocket', 'polling'],
            reconnectionAttempts: 10,
            timeout: 10000
        });

        const editor = document.getElementById('editor');
        const chatFlow = document.getElementById('chat-flow');
        const chatInput = document.getElementById('chatInput');
        const statusText = document.getElementById('status-text');
        const dot = document.getElementById('dot');

        // Connection Management
        socket.on('connect', () => {
            statusText.innerText = "LIVE_CONNECTION_ESTABLISHED";
            dot.style.background = "var(--accent)";
        });

        socket.on('connect_error', () => {
            statusText.innerText = "RETRYING_CONNECTION...";
            dot.style.background = "orange";
        });

        // Theme Toggle
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            document.documentElement.setAttribute('data-theme', current === 'stealth' ? 'neon' : 'stealth');
        }

        // Logic: Document Sync
        socket.on('init-state', (state) => {
            editor.value = state.content;
            if (state.locked) applyLockStyle();
        });

        editor.addEventListener('input', () => {
            if (socket.connected) {
                socket.emit('doc-update', editor.value);
            }
        });

        socket.on('doc-sync', (content) => {
            editor.value = content;
        });

        function requestLock() {
            if(confirm("LOCK PROTOCOL: This action is irreversible. Finalize document?")) {
                socket.emit('lock-request');
            }
        }

        socket.on('doc-locked', (data) => {
            editor.value = data.content;
            applyLockStyle();
        });

        function applyLockStyle() {
            editor.readOnly = true;
            editor.classList.add('locked-state');
            statusText.innerText = "OFFICIAL_RECORD_LOCKED";
            dot.style.background = "var(--lock-color)";
            document.getElementById('lockBtn').style.display = 'none';
        }

        // Logic: Chat
        chatInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && chatInput.value.trim() && socket.connected) {
                socket.emit('message', { text: chatInput.value });
                chatInput.value = '';
            }
        });

        socket.on('new-message', (msg) => {
            const div = document.createElement('div');
            div.className = 'msg-bubble';
            div.innerHTML = `<small style="opacity: 0.4; font-family: var(--font-mono)">${msg.time}</small><br>${msg.text}`;
            chatFlow.appendChild(div);
            chatFlow.scrollTop = chatFlow.scrollHeight;
        });

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            statusText.innerText = "LINK_COPIED_TO_CLIPBOARD";
            setTimeout(() => statusText.innerText = editor.readOnly ? "OFFICIAL_RECORD_LOCKED" : "LIVE_CONNECTION_ESTABLISHED", 2000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comm-OS | Global</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #0b141a; --header: #202c33; --accent: #00a884; --text: #e9edef; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; }
        
        /* AUTH MODAL */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .auth-card { background: var(--header); padding: 40px; border-radius: 8px; text-align: center; width: 90%; max-width: 400px; }
        
        /* MAIN LAYOUT */
        #main-app { display: none; height: 100vh; grid-template-columns: 350px 1fr; }
        
        /* WHATSAPP SIDEBAR */
        #sidebar { background: #111b21; border-right: 1px solid #222d34; display: flex; flex-direction: column; }
        .header { background: var(--header); padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; }
        #chat-list { flex: 1; overflow-y: auto; }
        .msg { padding: 8px 15px; margin: 4px 15px; border-radius: 8px; background: #202c33; font-size: 0.9rem; align-self: flex-start; max-width: 80%; }
        .doc-link { color: var(--accent); cursor: pointer; text-decoration: underline; display: block; margin-top: 5px; font-weight: bold; }

        /* HIDDEN EDITOR PANE */
        #editor-pane { background: var(--bg); display: none; flex-direction: column; padding: 20px; transition: 0.3s; }
        #editor { flex: 1; background: transparent; border: 1px solid #222d34; color: white; padding: 40px; font-size: 1.1rem; border-radius: 8px; outline: none; resize: none; }
        
        .btn { background: var(--accent); border: none; padding: 10px 20px; border-radius: 5px; color: #0b141a; font-weight: bold; cursor: pointer; }
        .logout-btn { background: transparent; border: 1px solid #ef4444; color: #ef4444; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1 style="color: var(--accent)">Comm-OS</h1>
            <p>Global Authentication</p>
            <input type="tel" id="phoneInput" placeholder="+ (Any Global Number)" style="width:100%; padding:15px; margin-bottom:20px; border-radius:5px; border:none;">
            <button class="btn" style="width:100%" onclick="login()">Enter Vault</button>
        </div>
    </div>

    <div id="main-app">
        <div id="sidebar">
            <div class="header">
                <span id="user-display" style="font-size: 0.8rem;"></span>
                <button class="logout-btn" onclick="location.reload()">LOGOUT</button>
            </div>
            <div id="chat-list">
                <div style="padding: 20px; opacity: 0.5; font-size: 0.8rem;">SYSTEM: Click a document link to open the editor.</div>
            </div>
            <div style="padding: 15px;">
                <input type="text" id="chatInput" placeholder="Type a message..." style="width:100%; padding:12px; background:#2a3942; border:none; color:white; border-radius:8px;">
            </div>
        </div>

        <div id="editor-pane">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 id="current-doc-title">Document Editor</h3>
                <button id="lockBtn" class="btn" style="background:#f1592a" onclick="sealDoc()">🔒 SEAL RECORD</button>
            </div>
            <textarea id="editor"></textarea>
        </div>
    </div>

    <script>
        const socket = io();
        let activeDocId = null;
        let myPhone = "";

        // AUTH LOGIC
        function login() {
            myPhone = document.getElementById('phoneInput').value;
            if(!myPhone) return alert("Enter any phone number");
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'grid';
            document.getElementById('user-display').innerText = myPhone;
            socket.emit('auth-global', myPhone);
        }

        // INIT VAULT
        socket.on('init-vault', (vault) => {
            // Load messages including simulated doc links
            Object.keys(vault.documents).forEach(id => {
                appendMsg({ text: `Collaborative Doc Shared: ${id}`, docId: id });
            });
        });

        // CHAT LOGIC
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                socket.emit('message', { text: chatInput.value, sender: myPhone });
                chatInput.value = '';
            }
        });

        socket.on('new-entry', appendMsg);

        function appendMsg(msg) {
            const d = document.createElement('div');
            d.className = 'msg';
            d.innerHTML = `<div>${msg.text}</div>`;
            if(msg.docId) {
                d.innerHTML += `<span class="doc-link" onclick="openDoc('${msg.docId}')">Open ${msg.docId}</span>`;
            }
            document.getElementById('chat-list').appendChild(d);
        }

        // EDITOR LOGIC (The Reveal)
        function openDoc(id) {
            activeDocId = id;
            document.getElementById('editor-pane').style.display = 'flex';
            document.getElementById('current-doc-title').innerText = `Editing: ${id}`;
            // Fetch content from local storage or ask server (simplified here)
            socket.emit('request-doc', id);
        }

        socket.on('sync-doc', (data) => {
            if(activeDocId === data.id) document.getElementById('editor').value = data.body;
        });

        document.getElementById('editor').addEventListener('input', (e) => {
            socket.emit('update-doc', { id: activeDocId, body: e.target.value });
        });

        function sealDoc() {
            if(confirm("Seal this document globally?")) socket.emit('trigger-lock', activeDocId);
        }

        socket.on('vault-sealed', (data) => {
            if(activeDocId === data.id) {
                document.getElementById('editor').readOnly = true;
                document.getElementById('lockBtn').innerText = "SEALED";
                document.getElementById('lockBtn').disabled = true;
            }
        });
    </script>
</body>
</html>

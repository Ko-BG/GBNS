<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comm-OS | Official Terminal</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #15191c; --accent: #00a884; --official: #005c4b; --text: #e9edef; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Left Pane: WhatsApp/Telegram Hybrid */
        #chat-pane { width: 320px; border-right: 1px solid #222d34; display: flex; flex-direction: column; background: var(--panel); }
        .pane-title { padding: 15px; font-size: 0.8rem; font-weight: 600; color: var(--accent); border-bottom: 1px solid #222d34; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { background: #202c33; padding: 8px 12px; border-radius: 8px; font-size: 0.9rem; align-self: flex-start; border: 1px solid #303c44; }

        /* Center Pane: Word/Outlook Hybrid */
        #doc-pane { flex: 1; display: flex; flex-direction: column; background: var(--bg); padding: 40px; position: relative; }
        #editor { flex: 1; background: transparent; color: var(--text); border: none; font-size: 1.1rem; line-height: 1.6; outline: none; resize: none; font-family: 'Georgia', serif; }
        
        /* Signature UX (The Smart Pen Layer) */
        #sig-canvas-container { 
            display: none; position: absolute; bottom: 100px; right: 80px; 
            width: 300px; height: 150px; border: 2px dashed var(--accent); background: rgba(0, 168, 132, 0.05); border-radius: 8px; 
        }
        canvas { width: 100%; height: 100%; touch-action: none; cursor: crosshair; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { background: var(--official); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn:disabled { opacity: 0.3; }
        
        /* Official Status UI */
        #watermark { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); font-size: 8rem; opacity: 0.05; font-weight: 900; pointer-events: none; }
    </style>
</head>
<body>

    <div id="chat-pane">
        <div class="pane-title">DIRECT_LINE // SECURE</div>
        <div id="messages"></div>
        <input type="text" id="chatInput" placeholder="Message..." style="background:#2a3942; border:none; padding:15px; color:white; outline:none;">
    </div>

    <div id="doc-pane">
        <div class="btn-group">
            <button class="btn" onclick="activateSignature()">✍️ Add Signature</button>
            <button id="lockBtn" class="btn" style="background:#f1592a" onclick="lockRecord()" disabled>🔒 Seal Official Record</button>
        </div>
        
        <div id="watermark">OFFICIAL</div>
        <textarea id="editor" placeholder="Draft your official communication..."></textarea>
        
        <div id="sig-canvas-container">
            <div style="font-size: 0.6rem; padding: 5px; color: var(--accent);">SIGN_WITH_PEN_OR_FINGER</div>
            <canvas id="sig-canvas"></canvas>
            <button onclick="clearSig()" style="position:absolute; bottom:-25px; right:0; background:none; border:none; color:white; font-size:0.7rem; cursor:pointer;">Clear</button>
        </div>
    </div>

    <script>
        const socket = io();
        const editor = document.getElementById('editor');
        const canvas = document.getElementById('sig-canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        // --- Socket Logic ---
        socket.on('sync-all', (state) => {
            editor.value = state.doc;
            if (state.locked) applyLock(state.sigData);
        });

        // --- Smart Pen / Finger Drawing Logic ---
        function activateSignature() {
            document.getElementById('sig-canvas-container').style.display = 'block';
            document.getElementById('lockBtn').disabled = false;
            // Set internal resolution to match display size
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (e.clientX || e.touches[0].clientX) - rect.left,
                y: (e.clientY || e.touches[0].clientY) - rect.top
            };
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('touchmove', draw);
        window.addEventListener('mouseup', () => drawing = false);

        function startDraw(e) { drawing = true; draw(e); }
        function draw(e) {
            if (!drawing) return;
            const pos = getPos(e);
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#00a884';
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function clearSig() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // --- Finalization Logic ---
        function lockRecord() {
            const sigData = canvas.toDataURL(); // Capture signature as image
            socket.emit('seal-record', { body: editor.value, sig: sigData });
        }

        socket.on('record-sealed', (data) => applyLock(data.sig));

        function applyLock(sigImg) {
            editor.readOnly = true;
            document.getElementById('sig-canvas-container').style.display = 'block';
            document.getElementById('sig-canvas-container').style.border = 'none';
            document.getElementById('sig-canvas-container').style.background = 'none';
            
            // Convert canvas to static image of signature
            const img = new Image();
            img.src = sigImg;
            img.style.width = "100%";
            document.getElementById('sig-canvas-container').innerHTML = '';
            document.getElementById('sig-canvas-container').appendChild(img);
            
            document.getElementById('watermark').style.display = 'block';
            document.getElementById('lockBtn').innerText = "RECORD_SEALED";
            document.getElementById('lockBtn').disabled = true;
        }

        // --- Standard Chat/Draft Sync ---
        chatInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') { socket.emit('chat', chatInput.value); chatInput.value = ''; }
        });
        socket.on('chat-new', text => {
            const div = document.createElement('div');
            div.className = 'bubble';
            div.innerText = text;
            document.getElementById('messages').appendChild(div);
        });
    </script>
</body>
</html>
